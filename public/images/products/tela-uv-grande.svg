<svg xmlns="http://www.w3.org/2000/svg" width="700" height="1000" viewBox="0 0 700 1000">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="45%" style="stop-color:#283593"/>
      <stop offset="100%" style="stop-color:#4a148c"/>
    </linearGradient>
    <linearGradient id="snow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eceff1"/>
      <stop offset="100%" style="stop-color:#b0bec5"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="700" height="1000" fill="url(#sky2)"/>
  <!-- Stars -->
  <circle cx="80" cy="80" r="2" fill="white" opacity="0.9"/>
  <circle cx="150" cy="45" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="220" cy="100" r="2" fill="white" opacity="0.7"/>
  <circle cx="350" cy="60" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="420" cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="500" cy="90" r="2" fill="white" opacity="0.7"/>
  <circle cx="580" cy="50" r="2" fill="white" opacity="0.9"/>
  <circle cx="630" cy="120" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="60" cy="180" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="290" cy="150" r="2" fill="white" opacity="0.8"/>
