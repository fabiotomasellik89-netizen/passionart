  <path d="M0 300 Q175 200 350 280 Q525 360 700 260" fill="none" stroke="#00e5ff" stroke-width="60" opacity="0.08"/>
  <path d="M0 340 Q200 250 400 320 Q560 380 700 300" fill="none" stroke="#69f0ae" stroke-width="40" opacity="0.1"/>
  <!-- Mountain range back -->
  <path d="M0 700 L140 420 L280 560 L420 380 L560 500 L700 420 L700 1000 L0 1000 Z" fill="#1a237e" opacity="0.6"/>
  <!-- Mountain range front -->
  <path d="M0 800 L100 560 L200 650 L350 460 L480 600 L600 500 L700 580 L700 1000 L0 1000 Z" fill="#283593" opacity="0.8"/>
  <!-- Snow caps -->
  <path d="M100 560 L80 590 L120 590 Z" fill="url(#snow)"/>
  <path d="M350 460 L320 495 L380 495 Z" fill="url(#snow)"/>
  <path d="M600 500 L575 530 L625 530 Z" fill="url(#snow)"/>
  <!-- Foreground hills -->
  <path d="M0 900 Q175 820 350 880 Q525 940 700 870 L700 1000 L0 1000 Z" fill="#37474f"/>
  <!-- Pine trees -->
  <path d="M60 870 L80 770 L100 870 Z" fill="#2e7d32" opacity="0.9"/>
  <path d="M80 860 L100 780 L120 860 Z" fill="#2e7d32"/>
