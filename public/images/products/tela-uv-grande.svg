  <circle cx="580" cy="130" r="45" fill="#fff9c4" opacity="0.9"/>
  <circle cx="600" cy="115" r="38" fill="#1a237e" opacity="0.9"/>
  <!-- Text -->
  <rect x="0" y="920" width="700" height="80" fill="#0d0d2b" opacity="0.5"/>
  <text x="350" y="962" text-anchor="middle" font-family="Georgia,serif" font-size="26" fill="#eceff1" letter-spacing="3">PAESAGGIO MONTANO</text>
  <text x="350" y="988" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#b0bec5" letter-spacing="1">Tela Stampata UV • 70×100 cm</text>
