<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1200" viewBox="0 0 800 1200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#f3e5f5"/>
    </radialGradient>
    <radialGradient id="flower1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f48fb1"/>
      <stop offset="100%" style="stop-color:#e91e63"/>
    </radialGradient>
    <radialGradient id="flower2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ce93d8"/>
      <stop offset="100%" style="stop-color:#9c27b0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1200" fill="url(#bg)"/>
  <!-- Stem -->
  <line x1="400" y1="600" x2="400" y2="1000" stroke="#4caf50" stroke-width="8" stroke-linecap="round"/>
  <line x1="400" y1="780" x2="480" y2="700" stroke="#4caf50" stroke-width="5" stroke-linecap="round"/>
  <line x1="400" y1="860" x2="320" y2="780" stroke="#4caf50" stroke-width="5" stroke-linecap="round"/>
  <!-- Main flower petals -->
  <ellipse cx="400" cy="480" rx="80" ry="120" fill="url(#flower1)" opacity="0.9" transform="rotate(-20,400,480)"/>
  <ellipse cx="400" cy="480" rx="80" ry="120" fill="url(#flower1)" opacity="0.9" transform="rotate(20,400,480)"/>
  <ellipse cx="400" cy="480" rx="80" ry="120" fill="url(#flower1)" opacity="0.9" transform="rotate(60,400,480)"/>
  <ellipse cx="400" cy="480" rx="80" ry="120" fill="url(#flower1)" opacity="0.9" transform="rotate(-60,400,480)"/>
  <ellipse cx="400" cy="480" rx="80" ry="120" fill="url(#flower1)" opacity="0.9" transform="rotate(100,400,480)"/>
  <ellipse cx="400" cy="480" rx="80" ry="120" fill="url(#flower1)" opacity="0.9" transform="rotate(-100,400,480)"/>
  <circle cx="400" cy="480" r="55" fill="#fff176"/>
  <circle cx="400" cy="480" r="35" fill="#fdd835"/>
  <!-- Side flower -->
  <ellipse cx="570" cy="320" rx="50" ry="75" fill="url(#flower2)" opacity="0.8" transform="rotate(30,570,320)"/>
  <ellipse cx="570" cy="320" rx="50" ry="75" fill="url(#flower2)" opacity="0.8" transform="rotate(-30,570,320)"/>
  <ellipse cx="570" cy="320" rx="50" ry="75" fill="url(#flower2)" opacity="0.8" transform="rotate(90,570,320)"/>
  <circle cx="570" cy="320" r="30" fill="#fff176"/>
  <!-- Small flower -->
  <ellipse cx="230" cy="380" rx="40" ry="60" fill="#f48fb1" opacity="0.7" transform="rotate(15,230,380)"/>
  <ellipse cx="230" cy="380" rx="40" ry="60" fill="#f48fb1" opacity="0.7" transform="rotate(-15,230,380)"/>
  <ellipse cx="230" cy="380" rx="40" ry="60" fill="#f48fb1" opacity="0.7" transform="rotate(75,230,380)"/>
  <circle cx="230" cy="380" r="22" fill="#fdd835"/>
  <!-- Leaves -->
  <ellipse cx="480" cy="710" rx="55" ry="25" fill="#66bb6a" opacity="0.8" transform="rotate(-35,480,710)"/>
  <ellipse cx="320" cy="790" rx="55" ry="25" fill="#66bb6a" opacity="0.8" transform="rotate(35,320,790)"/>
  <!-- Text -->
  <rect x="0" y="1090" width="800" height="110" fill="#9c27b0" opacity="0.2"/>
  <text x="400" y="1143" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#6a1b9a" letter-spacing="2">FIORI DI PRIMAVERA</text>
  <text x="400" y="1175" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#9c27b0" opacity="0.8" letter-spacing="1">Tela Stampata UV • 40×60 cm</text>
</svg>
